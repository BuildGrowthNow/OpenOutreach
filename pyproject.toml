[tool.black]
line-length = 100
target-version = ['py311']
exclude = '''
(
    /(
        \.eggs
      | \.git
      | \.venv
      | build
      | dist
      | migrations
    )/
)
'''

[tool.pylint]
max-line-length = 100
disable = [
    "C0114",  # missing-module-docstring
    "C0115",  # missing-class-docstring
    "C0116",  # missing-function-docstring
    "C0412",  # ungrouped-imports (Django imports often need specific order)
    "C0413",  # wrong-import-position (Django settings imports)
    "R0801",  # duplicate-code (common in similar patterns)
    "W0611",  # unused-import (some imports are for side effects)
    "W0613",  # unused-argument (e.g., in signal handlers)
    "W0718",  # broad-exception-caught (necessary in some cases)
    "W1203",  # logging-fstring-interpolation (f-string logging)
    "W1309",  # f-string-without-interpolation
]