name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
          SSH_AUTH_SOCK: /dev/null
        run: |
          # Clone or update the repository on the server (force reset to avoid merge conflicts)
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o IdentitiesOnly=yes "${EC2_USER}@${EC2_HOST}" "
            set -e
            if [ -d ~/OpenOutreach/.git ]; then
              cd ~/OpenOutreach
              # Ensure deploy user owns workspace files before cleanup
              sudo chown -R "${EC2_USER}:${EC2_USER}" .
              # Remove unsynced files (Dockerfile, docker-compose.yml, .env) and reset to GitHub
              git clean -fd
              git reset --hard
              git pull origin main
            else
              git clone https://github.com/buildgrowthnow/openoutreach.git ~/OpenOutreach
            fi
            cd ~/OpenOutreach
          "
          
          # Deploy with docker-compose
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o IdentitiesOnly=yes "${EC2_USER}@${EC2_HOST}" "
            set -e
            cd ~/OpenOutreach
            docker compose down
            docker compose up -d --build
          "

      - name: Wait for services to start
        run: |
          echo "Waiting 15 seconds for services to initialize..."
          sleep 15

      - name: Check Docker Compose Status
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "Checking Docker Compose status..."
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o IdentitiesOnly=yes "${EC2_USER}@${EC2_HOST}" "
            set -e
            cd ~/OpenOutreach
            docker compose ps -a
          "

      - name: Check Docker Logs
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "Checking Docker logs for services..."
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o IdentitiesOnly=yes "${EC2_USER}@${EC2_HOST}" "
            set -e
            cd ~/OpenOutreach
            docker compose logs --tail=50
          "

      - name: Cleanup SSH
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts