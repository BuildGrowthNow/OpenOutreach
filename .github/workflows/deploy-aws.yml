name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
          SSH_AUTH_SOCK: /dev/null
        run: |
          # Clone or update the repository on the server (force reset to avoid merge conflicts)
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o IdentitiesOnly=yes "${EC2_USER}@${EC2_HOST}" "
            set -e
            if [ -d ~/OpenOutreach/.git ]; then
              cd ~/OpenOutreach
              # Remove unsynced files (Dockerfile, docker-compose.yml, .env) and reset to GitHub
              git clean -fd
              git reset --hard
              git pull origin main
            else
              git clone https://github.com/buildgrowthnow/openoutreach.git ~/OpenOutreach
            fi
            cd ~/OpenOutreach
          "
          
          # Deploy with docker-compose
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o IdentitiesOnly=yes "${EC2_USER}@${EC2_HOST}" "
            set -e
            cd ~/OpenOutreach
            docker compose down
            docker compose up -d --build
          "
          
          # Fix SSL certificate permissions for nginx
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o IdentitiesOnly=yes "${EC2_USER}@${EC2_HOST}" "
            set -e
            echo 'Running SSL permissions fix...'
            # Add www-data to ssl-cert group
            if getent group ssl-cert; then
              usermod -a -G ssl-cert www-data
            else
              groupadd ssl-cert
              usermod -a -G ssl-cert www-data
            fi
            # Make certificates readable
            chmod 750 /etc/letsencrypt/live/
            chmod 750 /etc/letsencrypt/archive/
            chmod -R 640 /etc/letsencrypt/archive/*
            chmod -R 640 /etc/letsencrypt/live/*
            # Test and restart nginx
            nginx -t && systemctl restart nginx
            echo 'SSL permissions fix completed!'
          "
          
          echo "Deployment completed successfully!"

      - name: Cleanup SSH
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts