name: Frontend Tests

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-tests.yml
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/frontend-tests.yml

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: frontend
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint
      
      - name: Build frontend
        run: npm run build