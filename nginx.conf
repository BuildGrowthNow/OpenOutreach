# nginx.conf for serving Next.js frontend and proxying to Django

server {
    listen 3000;
    server_name localhost;

    # Root location - serves Next.js static files (from .next directory)
    root /app/frontend/.next;
    index index.html;

    # Try to serve static files first, then fall back to Next.js server
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to Django backend
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin and other backend routes
    location /admin/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media files
    location /media/ {
        alias /app/openoutreach/media/;
    }

    # Static files from Next.js build
    location /_next/ {
        alias /app/frontend/.next/_next/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}