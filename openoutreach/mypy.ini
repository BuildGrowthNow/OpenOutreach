[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = False
disallow_untyped_calls = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
disallow_untyped_decorators = False
no_implicit_optional = False
warn_redundant_casts = False
warn_unused_ignores = False
warn_unreachable = False
strict_equality = False
strict_optional = False
disable_error_code = var-annotated, attr-defined, dict-item, annotation-unchecked

# Exclude migration files (they are auto-generated and shouldn't be type-checked)
exclude = migrations/|mongodb/models\.py|mongodb/utils\.py|mongodb/migrations\.py|crm/models/linkedin_credentials\.py|crm/models/link\.py

[mypy.plugins.django-stubs]
django_settings_module = openoutreach.settings

# Suppress import-untyped warnings for Django and DRF
[mypy-django.*]
ignore_missing_imports = True

[mypy-django.db.*]
ignore_missing_imports = True

[mypy-rest_framework.*]
ignore_missing_imports = True

[mypy-psutil]
ignore_missing_imports = True

[mypy-pymongo.*]
ignore_missing_imports = True

[mypy-joblib]
ignore_missing_imports = True

[mypy-linkedin_cli.*]
ignore_missing_imports = True

[mypy-crm.migrations.*]
ignore_missing_imports = True

[mypy-mongodb.utils.*]
ignore_missing_imports = True

[mypy-mongodb.connection.*]
ignore_missing_imports = True

[mypy-core.vendor.*]
ignore_missing_imports = True

[mypy-core.onboarding_wizard.*]
ignore_missing_imports = True

[mypy-prompt_toolkit.*]
ignore_missing_imports = True

[mypy-questionary.*]
