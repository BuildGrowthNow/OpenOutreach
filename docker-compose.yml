services:
  openoutreach:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
        - NEXT_PUBLIC_API_URL=https://linkedin-api.lengrowth.com
        - NEXT_PUBLIC_APP_URL=https://linkedin.lengrowth.com
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - ENABLE_VNC=true
      - HOST_UID=1000
      - HOST_GID=1000
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-in-production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - OPENOUTREACH_LOG_LEVEL=${OPENOUTREACH_LOG_LEVEL:-INFO}
      - DOCKER_ENV=true
      - SKIP_DAEMON=true
      - NEXT_PUBLIC_API_URL=https://linkedin-api.lengrowth.com
      - NEXT_PUBLIC_APP_URL=https://linkedin.lengrowth.com
      
      # LLM Configuration
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-}
      - AI_MODEL=${AI_MODEL}
      # LinkedIn Configuration
      - LINKEDIN_USERNAME=${LINKEDIN_USERNAME}
      - LINKEDIN_PASSWORD=${LINKEDIN_PASSWORD}
      # MongoDB Configuration
      - MONGODB_ENABLED=${MONGODB_ENABLED:-true}
      - MONGODB_ATLAS_URI=${MONGODB_ATLAS_URI}
      
      # Supabase Configuration
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    volumes:
      - ./data:/app/data
      - ./openoutreach/media:/app/openoutreach/media
      
    ports:
      - "3000:3000"
      - "8000:8000"
      - "6080:6080"
      - "5900:5900"