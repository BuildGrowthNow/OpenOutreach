[pytest]
pythonpath = .
testpaths = tests
DJANGO_SETTINGS_MODULE = openoutreach.settings.development
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
addopts = --reuse-db
markers =
    no_embed_mock: skip the autouse fastembed mock
    no_contact_capture_mock: skip the autouse contact-info capture mock
