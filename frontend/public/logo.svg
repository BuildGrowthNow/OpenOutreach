<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo Icon - Abstract "L" design with connection nodes -->
  <g transform="translate(10, 10)">
    <!-- Main "L" shape -->
    <path d="M20 40 L20 10 L45 10" fill="none" stroke="#10b981" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Connection nodes -->
    <circle cx="20" cy="40" r="4" fill="#10b981"/>
    <circle cx="20" cy="10" r="4" fill="#10b981"/>
    <circle cx="45" cy="10" r="4" fill="#10b981"/>
    
    <!-- Connection lines between nodes -->
    <line x1="20" y1="10" x2="55" y2="10" stroke="#10b981" stroke-width="2" opacity="0.3"/>
    <line x1="20" y1="10" x2="20" y2="40" stroke="#10b981" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- "Lengrowth" text -->
  <text x="70" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f4f4f5" letter-spacing="1">
    Lengrowth
  </text>
  
  <!-- Link-like accent -->
  <path d="M170 20 C170 20 165 30 150 30 C135 30 135 25 135 25" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <circle cx="170" cy="20" r="3" fill="#10b981"/>
</svg>